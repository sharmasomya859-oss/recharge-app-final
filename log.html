<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Glass Login</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    font-family: Arial;

    /* Background Image */
    background: url("https://images.unsplash.com/photo-1503264116251-35a269479413")
    no-repeat center center/cover;

    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Glass Box */
  .login-box {
    width: 320px;
    padding: 30px;
    border-radius: 15px;

    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    border: 1px solid rgba(255, 255, 255, 0.3);
    color: white;
    text-align: center;
  }

  .login-box h2 {
    margin-bottom: 20px;
  }

  .login-box input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;

    border: none;
    outline: none;
    border-radius: 8px;
  }

  .login-box button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;

    border: none;
    border-radius: 8px;
    background: #00c6ff;
    color: white;
    cursor: pointer;
  }

  .login-box button:hover {
    background: #0072ff;
  }
</style>
</head>

<body>

<div class="login-box">
  <h2>Login</h2>

  <input type="text" placeholder="Username">
  <input type="password" placeholder="Password">

  <button>Login</button>
</div>

</body>
</html>
